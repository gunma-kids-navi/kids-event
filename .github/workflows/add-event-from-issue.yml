name: イベント追加（Issue連携）

on:
  issues:
    types: [opened, labeled]

jobs:
  add-event:
    # new-event ラベルが付いたときだけ実行
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'new-event') ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'new-event'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Issue本文をファイルに保存
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body || '';
            fs.writeFileSync('/tmp/issue_body.txt', body, 'utf-8');
            console.log('Issue本文を保存しました');

      - name: events.js にイベントを追加
        id: add_event
        env:
          ISSUE_BODY_FILE: /tmp/issue_body.txt
        run: node .github/scripts/add-event-from-issue.js

      - name: 変更をコミット＆プッシュ
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions [Bot]"
          git add src/data/events.js
          git commit -m "feat: イベント追加 (close #${{ github.event.issue.number }})"
          git push

      - name: Issueにコメントしてクローズ
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ イベントを `events.js` に追加しました！\nデプロイが完了するとサイトに反映されます。'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: エラー時にIssueへ通知
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ イベントの追加に失敗しました。\n必須フィールドの入力漏れや日付フォーマット（YYYY-MM-DD）を確認してください。\n\nActions のログ: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
